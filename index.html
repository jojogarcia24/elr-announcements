<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Elite Living Announcements</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root{
      --bg0:#07090d;
      --bg1:#0b0f16;
      --card: rgba(15,18,26,0.78);
      --cardBorder: rgba(255,255,255,0.10);
      --muted: rgba(255,255,255,0.72);
      --text: rgba(255,255,255,0.95);
      --accent:#2f6bff;
      --accent2:#4b87ff;
      --shadow: 0 16px 40px rgba(0,0,0,0.55);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 44px 20px 64px;
      background:
        radial-gradient(1200px 500px at 20% 12%, rgba(47,107,255,0.18), transparent 60%),
        radial-gradient(900px 500px at 80% 18%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
    }

    .wrap { max-width: 1120px; margin: 0 auto; }

    h1 {
      text-align: center;
      margin: 0 0 22px;
      font-size: 46px;
      letter-spacing: 0.3px;
      line-height: 1.1;
      font-weight: 850;
      text-shadow: 0 10px 30px rgba(0,0,0,0.55);
    }

    .subtle-line {
      height: 1px;
      width: 100%;
      max-width: 780px;
      margin: 14px auto 26px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    }

    .toolbar {
      margin: 0 auto 26px;
      background: rgba(10,12,18,0.75);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 260px 170px;
      gap: 12px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .toolbar input, .toolbar select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.35);
      color: #fff;
      outline: none;
      font-size: 14px;
    }

    .toolbar input::placeholder { color: rgba(255,255,255,0.50); }

    .post-now {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: transform 0.18s ease, box-shadow 0.25s ease, opacity 0.2s ease;
    }

    .post-now:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(47,107,255,0.25), 0 14px 30px rgba(47,107,255,0.25);
      opacity: 0.98;
    }

    #posts { margin: 0 auto; }

    .post {
      background: var(--card);
      border: 1px solid var(--cardBorder);
      padding: 22px;
      border-radius: var(--radius);
      margin-bottom: 18px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .post:hover {
      transform: translateY(-3px);
      border-color: rgba(47,107,255,0.22);
      box-shadow: 0 18px 50px rgba(0,0,0,0.65);
    }

    .post-inner { display: flex; gap: 24px; align-items: flex-start; }

    .image-side { width: 250px; min-width: 250px; }

    .image-side img, .image-side iframe {
      width: 100%;
      height: 200px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
    }

    .no-image {
      height: 200px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,0.70);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      padding: 12px;
      text-align: center;
    }

    .no-image small {
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      word-break: break-word;
    }

    .content-side { flex: 1; }

    .title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }

    .content-side h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: 0.2px;
    }

    .badge {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      padding: 5px 9px;
      font-size: 11px;
      border-radius: 999px;
      font-weight: 900;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    .badge.secondary {
      background: rgba(47, 107, 255, 0.18);
      border: 1px solid rgba(47, 107, 255, 0.35);
      padding: 5px 10px;
    }

    .meta { margin-top: 4px; margin-bottom: 16px; display: grid; gap: 8px; }
    .meta span { display: block; color: rgba(255,255,255,0.72); font-size: 14px; line-height: 1.45; }

    .description { margin: 0 0 16px; line-height: 1.7; color: rgba(255,255,255,0.92); font-size: 15px; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      background: rgba(47, 107, 255, 0.16);
      border: 1px solid rgba(47, 107, 255, 0.30);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(47, 107, 255, 0.24);
      border-color: rgba(47,107,255,0.45);
    }

    .delete-btn {
      display: inline-block;
      padding: 10px 14px;
      background: rgba(255, 77, 79, 0.18);
      border: 1px solid rgba(255, 77, 79, 0.35);
      color: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .delete-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 77, 79, 0.28);
      border-color: rgba(255, 77, 79, 0.5);
    }

    .edit-btn {
      display: inline-block;
      padding: 10px 14px;
      background: rgba(255, 193, 7, 0.16);
      border: 1px solid rgba(255, 193, 7, 0.35);
      color: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .edit-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 193, 7, 0.24);
      border-color: rgba(255, 193, 7, 0.48);
    }

    .pin-btn {
      display: inline-block;
      padding: 10px 14px;
      background: rgba(47, 107, 255, 0.16);
      border: 1px solid rgba(47, 107, 255, 0.35);
      color: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .pin-btn:hover {
      transform: translateY(-1px);
      background: rgba(47, 107, 255, 0.24);
      border-color: rgba(47, 107, 255, 0.48);
    }

    .pinned-banner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(47, 107, 255, 0.16);
      border: 1px solid rgba(47, 107, 255, 0.32);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .empty {
      padding: 18px;
      border-radius: var(--radius);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    @media (max-width: 900px) {
      h1 { font-size: 34px; }
      .toolbar { grid-template-columns: 1fr; }
      .post-inner { flex-direction: column; }
      .image-side { width: 100%; min-width: 0; }
      .image-side img, .image-side iframe, .no-image { height: 200px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>📣 Elite Living Announcements</h1>
    <div class="subtle-line"></div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search posts..." />
      <select id="channelFilter">
        <option value="">All Channels</option>
      </select>
      <button class="post-now" id="postNowBtn">+ Post Now</button>
    </div>

    <div id="posts"></div>
  </div>

  <script>
    // ====== CONFIG ======
    const SUPABASE_URL = "https://jbthylezmmusmoqamqld.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpidGh5bGV6bW11c21vcWFtcWxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNTEwMzMsImV4cCI6MjA4NjcyNzAzM30.wJaqVMLIiLhsENyY9i6xDxbosFjO40Fr6dJiAyeOa4Y"; // <- keep your real one here
    const POST_FORM_URL = "https://api.leadconnectorhq.com/widget/form/hczSZ9VUgJztIGcoj0vc";

    const DOC_FALLBACK_THUMB =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="800" height="520">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#0b0f16"/>
              <stop offset="1" stop-color="#2f6bff"/>
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" rx="28" fill="url(#g)"/>
          <rect x="56" y="56" width="688" height="408" rx="22" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)"/>
          <text x="100" y="170" fill="white" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="46" font-weight="800">DOCUMENT</text>
          <text x="100" y="230" fill="rgba(255,255,255,0.75)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">Click Download Attachment</text>
          <text x="100" y="340" fill="rgba(255,255,255,0.55)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18">PDF / LeadConnector doc</text>
        </svg>
      `);

    const LINK_FALLBACK_THUMB =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="800" height="520">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#0b0f16"/>
              <stop offset="1" stop-color="#4b87ff"/>
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" rx="28" fill="url(#g)"/>
          <rect x="56" y="56" width="688" height="408" rx="22" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)"/>
          <text x="100" y="170" fill="white" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="46" font-weight="800">LINK</text>
          <text x="100" y="230" fill="rgba(255,255,255,0.75)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">Click View Link</text>
          <text x="100" y="340" fill="rgba(255,255,255,0.55)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18">No upload attached</text>
        </svg>
      `);

    const CHANNELS = [
      "Announcement",
      "Tech Update",
      "Featured Listing",
      "Featured Class",
      "Featured Vendor",
      "Featured Agent",
      "Featured Event",
      "Open House",
      "Broker Post"
    ];

    const CHANNEL_COLUMN = "channel";

    // ====== STATE ======
    let allPosts = [];

    const ADMIN_TOKEN_KEY = "elr_admin_delete_token";
    const params = new URLSearchParams(window.location.search);
    const adminTokenFromUrl = params.get("admin");

    if (adminTokenFromUrl) {
      localStorage.setItem(ADMIN_TOKEN_KEY, adminTokenFromUrl);
      params.delete("admin");
      const cleanUrl =
        window.location.pathname +
        (params.toString() ? "?" + params.toString() : "") +
        window.location.hash;
      window.history.replaceState({}, "", cleanUrl);
    }

    function getAdminToken() {
      return localStorage.getItem(ADMIN_TOKEN_KEY) || "";
    }

    function isAdminMode() {
      return !!getAdminToken();
    }

    async function deleteAnnouncement(id) {
      if (!confirm("Delete this announcement?")) return;

      try {
        const resp = await fetch("/.netlify/functions/delete-announcement", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getAdminToken()
          },
          body: JSON.stringify({ id })
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error || "Delete failed");
        }

        location.reload();
      } catch (err) {
        alert(err.message || "Delete failed");
      }
    }

    async function editAnnouncement(post) {
      const newTitle = prompt("Edit title:", post.title || "");
      if (newTitle === null) return;

      const newDescription = prompt("Edit description:", post.description || "");
      if (newDescription === null) return;

      const newLocation = prompt("Edit location:", post.location || "");
      if (newLocation === null) return;

      try {
        const resp = await fetch("/.netlify/functions/edit-announcement", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getAdminToken()
          },
          body: JSON.stringify({
            id: post.id,
            updates: {
              title: newTitle,
              description: newDescription,
              location: newLocation
            }
          })
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error || "Edit failed");
        }

        location.reload();
      } catch (err) {
        alert(err.message || "Edit failed");
      }
    }

    async function togglePinAnnouncement(post) {
      try {
        const resp = await fetch("/.netlify/functions/edit-announcement", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getAdminToken()
          },
          body: JSON.stringify({
            id: post.id,
            updates: {
              pinned: !post.pinned
            }
          })
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error || "Pin update failed");
        }

        location.reload();
      } catch (err) {
        alert("Pin update failed: " + (err.message || "Unknown error"));
      }
    }

    // ====== UI ======
    const searchInput = document.getElementById("searchInput");
    const channelFilter = document.getElementById("channelFilter");
    const postsContainer = document.getElementById("posts");
    const postNowBtn = document.getElementById("postNowBtn");

    CHANNELS.forEach(ch => {
      const opt = document.createElement("option");
      opt.value = ch;
      opt.textContent = ch;
      channelFilter.appendChild(opt);
    });

    postNowBtn.addEventListener("click", () => window.open(POST_FORM_URL, "_blank"));
    searchInput.addEventListener("input", render);
    channelFilter.addEventListener("change", render);

    // ====== SAFETY ======
    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function nl2br(str) {
      return escapeHtml(str).replaceAll("\n", "<br>");
    }

    // ====== MEDIA HELPERS ======
    function isImage(url) {
      return /\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i.test(url || "");
    }

    function isPDF(url) {
      return /\.pdf(\?.*)?$/i.test(url || "");
    }

    function isLeadConnectorDoc(url) {
      return /leadconnectorhq\.com\/documents\/download\//i.test(url || "");
    }

    function getHost(url) {
      try { return new URL(url).host; } catch { return ""; }
    }

    // SIMPLE RULE:
    // - Preview comes ONLY from uploads (image_url, attachment_url, attachment)
    // - If no upload exists, show a LINK card (not a scraped image)
    function pickPreviewUrl(post) {
      const candidates = [
        post.image_url,
        post.attachment_url,
        post.attachment
      ].filter(Boolean);

      const img = candidates.find(u => isImage(u));
      if (img) return img;

      const pdf = candidates.find(u => isPDF(u));
      if (pdf) return pdf;

      const lcd = candidates.find(u => isLeadConnectorDoc(u));
      if (lcd) return lcd;

      return "";
    }

    function renderMedia(previewUrl, linkUrl) {
      // If we have an upload preview: render it
      if (previewUrl) {
        const safeUrl = escapeHtml(previewUrl);

        if (isImage(previewUrl)) {
          return `<img src="${safeUrl}" alt="Post image" />`;
        }

        if (isPDF(previewUrl)) {
          return `
            <iframe
              src="${safeUrl}#toolbar=0&navpanes=0&scrollbar=0"
              loading="lazy"
              style="width:100%; height:200px; border:0; border-radius:14px; background:rgba(255,255,255,0.04);"
            ></iframe>
          `;
        }

        if (isLeadConnectorDoc(previewUrl)) {
          return `<img src="${escapeHtml(DOC_FALLBACK_THUMB)}" alt="Document thumbnail" />`;
        }

        return `<div class="no-image">Attachment Ready</div>`;
      }

      // No upload: show LINK card (clean, predictable)
      if (linkUrl) {
        const host = getHost(linkUrl);
        return `
          <div class="no-image">
            LINK READY
            <small>${escapeHtml(host || linkUrl)}</small>
          </div>
        `;
      }

      // Nothing at all
      return `<div class="no-image">No Attachment</div>`;
    }

    // ====== HELPERS ======
    function isNewPost(dateStr) {
      if (!dateStr) return false;
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return false;
      const diff = Date.now() - d.getTime();
      return diff < 7 * 24 * 60 * 60 * 1000;
    }

    function normalizeChannel(ch) {
      const s = (ch || "").trim();
      if (s.toLowerCase() === "annoucement") return "Announcement";
      return s;
    }

    function matchesSearch(post, q) {
      if (!q) return true;
      const hay = [
        post.title,
        post.description,
        post.location,
        post.announcer,
        normalizeChannel(post[CHANNEL_COLUMN])
      ].filter(Boolean).join(" ").toLowerCase();
      return hay.includes(q.toLowerCase());
    }

    function matchesChannel(post, selected) {
      if (!selected) return true;
      return normalizeChannel(post[CHANNEL_COLUMN]).toLowerCase() === selected.toLowerCase();
    }

    function formatTime(t) {
      if (!t) return "";
      return String(t).slice(0,5);
    }

    // ====== RENDER ======
    function render() {
      const q = searchInput.value.trim();
      const selectedChannel = channelFilter.value;

      const filtered = allPosts.filter(p => matchesSearch(p, q) && matchesChannel(p, selectedChannel));
      postsContainer.innerHTML = "";

      if (!filtered.length) {
        postsContainer.innerHTML = `<div class="empty">No posts found. Try another search or channel.</div>`;
        return;
      }

      filtered.forEach((post) => {
        const div = document.createElement("div");
        div.className = "post";

        const newBadge = isNewPost(post.date) ? `<span class="badge">NEW</span>` : "";
        const pinnedBadge = post.pinned ? `<span class="badge secondary">PINNED</span>` : "";
        const pinnedBanner = post.pinned ? `<div class="pinned-banner">📌 Pinned Announcement</div>` : "";
        const channel = normalizeChannel(post[CHANNEL_COLUMN]);

        const attachmentUrl = post.attachment_url || post.attachment || "";
        const previewUrl = pickPreviewUrl(post);
        const previewHtml = renderMedia(previewUrl, post.link);

        const downloadBtn = attachmentUrl
          ? `<a class="btn" href="${escapeHtml(attachmentUrl)}" target="_blank" rel="noopener">📎 Download Attachment</a>`
          : "";

        const linkBtn = post.link
          ? `<a class="btn" href="${escapeHtml(post.link)}" target="_blank" rel="noopener">🔗 View Link</a>`
          : "";

        const deleteBtn = isAdminMode()
          ? `<button class="delete-btn" onclick="deleteAnnouncement('${escapeHtml(post.id || "")}')">🗑 Delete</button>`
          : "";

        const editBtn = isAdminMode()
          ? `<button
              class="edit-btn"
              data-id="${escapeHtml(post.id || "")}"
              data-title="${escapeHtml(post.title || "")}"
              data-description="${escapeHtml(post.description || "")}"
              data-location="${escapeHtml(post.location || "")}"
            >✏ Edit</button>`
          : "";

        const pinBtn = isAdminMode()
          ? `<button
              class="pin-btn"
              data-id="${escapeHtml(post.id || "")}"
              data-pinned="${post.pinned ? "true" : "false"}"
            >${post.pinned ? "📍 Unpin" : "📌 Pin"}</button>`
          : "";

        const isEvent = (post.is_event === true) || (!!post.event_start_date);
        const recurrence = (post.recurrence || "").trim();

        const eventLine = isEvent
          ? (() => {
              const sd = post.event_start_date || "";
              const ed = post.event_end_date || "";
              const st = formatTime(post.event_start_time);
              const et = formatTime(post.event_end_time);

              const datePart = sd && ed && sd !== ed ? `${sd} → ${ed}` : (sd || "");
              const timePart = st && et ? `${st}–${et}` : (st || et || "");

              const bits = [];
              if (datePart) bits.push(`🗓️ ${escapeHtml(datePart)}`);
              if (timePart) bits.push(`⏰ ${escapeHtml(timePart)}`);
              if (recurrence) bits.push(`🔁 ${escapeHtml(recurrence)}`);

              return bits.length ? `<span>${bits.join(" &nbsp;•&nbsp; ")}</span>` : "";
            })()
          : "";

        const recurrenceBadge = isEvent && recurrence
          ? `<span class="badge secondary">${escapeHtml(recurrence)}</span>`
          : "";

        div.innerHTML = `
          <div class="post-inner">
            <div class="image-side">
              ${previewHtml}
            </div>

            <div class="content-side">
              ${pinnedBanner}
              <div class="title-row">
                <h2>${escapeHtml(post.title || "")}</h2>
                ${newBadge}
                ${pinnedBadge}
                ${recurrenceBadge}
              </div>

              <div class="meta">
                ${post.date ? `<span>📅 ${escapeHtml(post.date)}</span>` : ``}
                ${eventLine ? eventLine : ``}
                ${post.location ? `<span>📍 ${escapeHtml(post.location)}</span>` : ``}
                ${post.announcer ? `<span>👤 ${escapeHtml(post.announcer)}</span>` : ``}
                ${channel ? `<span>🏷️ ${escapeHtml(channel)}</span>` : ``}
              </div>

              ${post.description ? `<p class="description">${nl2br(post.description)}</p>` : ``}

              <div class="btn-row">
                ${linkBtn}
                ${downloadBtn}
                ${pinBtn}
                ${editBtn}
                ${deleteBtn}
              </div>
            </div>
          </div>
        `;

        div.style.opacity = 0;
        div.style.transition = "opacity 0.35s ease";
        postsContainer.appendChild(div);

        const editButtonEl = div.querySelector(".edit-btn");
        if (editButtonEl) {
          editButtonEl.addEventListener("click", () => {
            editAnnouncement({
              id: editButtonEl.getAttribute("data-id") || "",
              title: editButtonEl.getAttribute("data-title") || "",
              description: editButtonEl.getAttribute("data-description") || "",
              location: editButtonEl.getAttribute("data-location") || ""
            });
          });
        }

        const pinButtonEl = div.querySelector(".pin-btn");
        if (pinButtonEl) {
          pinButtonEl.addEventListener("click", () => {
            togglePinAnnouncement({
              id: pinButtonEl.getAttribute("data-id") || "",
              pinned: pinButtonEl.getAttribute("data-pinned") === "true"
            });
          });
        }

        setTimeout(() => { div.style.opacity = 1; }, 40);
      });
    }

    // ====== FETCH ======
    async function loadPosts() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/announcements?select=*&order=pinned.desc,created_at.desc`, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`Supabase error ${res.status}: ${txt}`);
        }

        const data = await res.json();
        allPosts = Array.isArray(data) ? data : [];
        render();
      } catch (e) {
        postsContainer.innerHTML = `<div class="empty">Couldn’t load posts. (API error)</div>`;
      }
    }

    loadPosts();
  </script>
</body>
</html>
